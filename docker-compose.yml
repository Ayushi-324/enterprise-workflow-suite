# =============================================================================
# docker-compose.yml — Local multi-service stack
# Services: web (FastAPI), db (PostgreSQL 16), nginx (reverse proxy)
#
# Run with: docker compose up --build -d
# =============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared network — services communicate by name (e.g. host "db" resolves
# to the postgres container's IP inside the bridge network)
# ---------------------------------------------------------------------------
networks:
  workflow_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes — Postgres data persists across container restarts
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  nginx_logs:

services:

  # ── PostgreSQL 16 ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine        # Alpine = ~80MB vs ~400MB for full image
    container_name: workflow_postgres
    restart: unless-stopped
    networks:
      - workflow_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-workflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-workflow_db}
    ports:
      - "5432:5432"                  # expose locally for psql / DBeaver access
    healthcheck:
      # pg_isready checks if Postgres is accepting connections on the right DB
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow_user} -d ${POSTGRES_DB:-workflow_db}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s              # give Postgres time to init before first check

  # ── FastAPI Application ─────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime               # explicitly target the production stage
    container_name: workflow_api
    restart: unless-stopped
    networks:
      - workflow_net
    depends_on:
      db:
        condition: service_healthy  # web won't start until DB healthcheck passes
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-workflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow_pass}
      POSTGRES_DB:       ${POSTGRES_DB:-workflow_db}
      POSTGRES_HOST:     db          # Docker service name resolves inside network
      POSTGRES_PORT:     5432
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-sk-placeholder}
      DEBUG:             ${DEBUG:-false}
      DB_ECHO:           ${DB_ECHO:-false}
    ports:
      - "8000:8000"                  # direct access for dev; nginx proxies in prod
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 20s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workflow_nginx
    restart: unless-stopped
    networks:
      - workflow_net
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"                      # public entry point — swap to 443 with SSL in prod
    volumes:
      - ./.docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
