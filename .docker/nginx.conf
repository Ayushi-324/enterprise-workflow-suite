# =============================================================================
# .docker/nginx.conf
# Production Nginx config — reverse proxy to Uvicorn, with:
#   - gzip compression (saves ~70% on JSON payloads)
#   - request rate limiting (DDoS mitigation)
#   - upstream health awareness
#   - security headers
# =============================================================================

# Rate limiting zone — 10MB memory zone, 30 req/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream fastapi_backend {
    server web:8000;              # Docker service name + internal port
    keepalive 32;                 # persistent connections to Uvicorn workers
}

server {
    listen 80;
    server_name _;                # catch-all — replace with domain in prod

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types application/json text/plain application/xml;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Proxy settings ───────────────────────────────────────────────────────
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;

        # Required headers for Uvicorn to reconstruct real client IP
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";    # enable keepalive upstream

        # Timeouts — tune based on your LlamaIndex processing time
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check endpoint (no rate limit) ────────────────────────────────
    location /health {
        proxy_pass         http://fastapi_backend/health;
        proxy_http_version 1.1;
        access_log         off;    # suppress health check logs from polluting access.log
    }
}
